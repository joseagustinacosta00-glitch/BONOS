<!doctype html>
<html lang="es-AR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bonos | TradingView</title>
  <link rel="stylesheet" href="/static/tradingview.css?v=tv2">
</head>
<body>
  <main class="tv-shell">
    <header class="tv-header">
      <div>
        <p class="tv-kicker">Bonos</p>
        <h1>Charts</h1>
      </div>
      <nav class="tv-actions" aria-label="Accesos">
        <a href="/">Inicio</a>
        <a href="/charts-demo">Graficos demo</a>
        <a href="/ai-demo">IA</a>
      </nav>
    </header>

    <section class="tv-card">
      <div class="tv-card-header">
        <div>
          <h2>Mis datos</h2>
          <p class="tv-subtle">Series cargadas en la base local. Eligi ticker, dato, mercado y liquidacion.</p>
        </div>
        <span id="ownDataStatus" class="tv-status">Sin serie</span>
      </div>
      <div class="tv-toolbar tv-toolbar-grid">
        <label>
          Ticker
          <input id="ownTicker" type="text" list="ownTickerOptions" placeholder="Ej. AL30" autocomplete="off">
          <datalist id="ownTickerOptions"></datalist>
        </label>
        <label>
          Dato
          <select id="ownMetric">
            <option value="parity">Paridad</option>
            <option value="dirty_price">Precio dirty</option>
            <option value="clean_price">Precio clean</option>
            <option value="ytm">TIR</option>
            <option value="tem">TEM</option>
            <option value="tna">TNA</option>
            <option value="volume">Volumen</option>
          </select>
        </label>
        <label>
          Mercado
          <select id="ownMarket">
            <option value="pesos">PESOS</option>
            <option value="cable">CABLE</option>
            <option value="mep">MEP</option>
          </select>
        </label>
        <label>
          Liquidacion
          <select id="ownSettlement">
            <option value="t1" selected>T+1</option>
            <option value="t0">T+0</option>
          </select>
        </label>
        <button id="ownPlot" type="button">Graficar</button>
        <button id="ownAddOverlay" type="button" class="tv-secondary">Agregar como overlay</button>
      </div>
      <div class="tv-overlay-list" id="ownOverlayList"></div>
      <div id="ownDataChart" class="tv-chart"></div>
    </section>

    <section class="tv-card tv-card-public">
      <div class="tv-card-header">
        <div>
          <h2>Instrumentos publicos (TradingView)</h2>
          <p class="tv-subtle">Widget oficial de TradingView para precios listados.</p>
        </div>
      </div>
      <div class="tv-toolbar">
        <label>
          Simbolo
          <select id="tvSymbolSelect">
            <option value="BCBA:AL30">AL30</option>
            <option value="BCBA:AL30D">AL30D</option>
            <option value="BCBA:GD30">GD30</option>
            <option value="BCBA:GD30D">GD30D</option>
            <option value="BCBA:AL35">AL35</option>
            <option value="BCBA:GD35">GD35</option>
            <option value="BCBA:AE38">AE38</option>
            <option value="BCBA:AL41">AL41</option>
            <option value="BCBA:IMV">Merval</option>
          </select>
        </label>
        <label>
          Buscar en TradingView
          <input id="tvSymbolInput" type="text" placeholder="Ej. BCBA:AL30 o NASDAQ:QQQ">
        </label>
        <button id="tvLoadButton" type="button">Cargar</button>
      </div>
      <div id="tradingviewChart" class="tv-chart"></div>
    </section>
  </main>

  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="/static/tradingview.js?v=tv2"></script>
</body>
</html>
